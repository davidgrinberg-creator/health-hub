<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Health Hub</title>
    
    <!-- PWA / Manifest -->
    <meta name="theme-color" content="#10b981">
    <link rel="manifest" href="data:application/manifest+json,{%22name%22:%22Health%20Hub%22,%22short_name%22:%22HealthHub%22,%22start_url%22:%22.%22,%22display%22:%22standalone%22,%22background_color%22:%22#f3f4f6%22,%22theme_color%22:%22#10b981%22,%22icons%22:[{%22src%22:%22https://placehold.co/512x512/10b981/white?text=HH%22,%22sizes%22:%22512x512%22,%22type%22:%22image/png%22}]}">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Configuração de Cores do Tailwind -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#10b981', // Verde Esmeralda
                        primaryDark: '#059669',
                        bgLight: '#f9fafb',
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <!-- Fontes e Ícones -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <!-- Chart.js para Gráficos -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- Supabase JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f9fafb;
            -webkit-tap-highlight-color: transparent;
        }
        
        .screen-enter {
            animation: fadeIn 0.3s ease-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Ocultar barra de rolagem */
        ::-webkit-scrollbar {
            width: 0px;
            background: transparent;
        }
    </style>
</head>
<body class="text-gray-800 antialiased pb-24">

    <!-- HEADER -->
    <header class="bg-white px-6 pt-12 pb-4 rounded-b-[2rem] shadow-sm sticky top-0 z-20">
        <div class="flex justify-between items-center">
            <div class="flex items-center gap-3">
                <img src="https://ui-avatars.com/api/?name=David+Grinberg&background=10b981&color=fff&rounded=true&bold=true" alt="Perfil" class="w-12 h-12 rounded-full shadow-md">
                <div>
                    <p class="text-xs text-gray-500 font-medium">Bom dia,</p>
                    <h1 class="text-xl font-bold text-gray-900">David Grinberg</h1>
                </div>
            </div>
            <button class="w-10 h-10 rounded-full bg-gray-50 flex items-center justify-center text-gray-600 hover:bg-gray-100 transition-colors">
                <i class="ph ph-bell text-xl"></i>
            </button>
        </div>
    </header>

    <!-- MAIN CONTENT -->
    <main id="app-content">
        <!-- SCREEN 1: DASHBOARD -->
        <section id="screen-dashboard" class="p-6 space-y-6 block screen-enter">
            
            <!-- Botão Registrar Hoje -->
            <div class="flex justify-between items-center mb-2">
                <h2 class="text-2xl font-bold text-gray-800">Visão Geral</h2>
                <button onclick="openAddModal()" class="bg-primary text-white px-4 py-2 rounded-full shadow-md hover:bg-primaryDark transition-colors font-bold text-sm flex items-center gap-2">
                    <i class="ph ph-plus font-bold text-lg"></i> Registrar
                </button>
            </div>

            <!-- CARD DE INTEGRAÇÃO STRAVA -->
            <div class="bg-white rounded-3xl p-5 shadow-sm border border-gray-100 mb-6 flex justify-between items-center">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 rounded-full bg-[#FC4C02]/10 flex items-center justify-center text-[#FC4C02]">
                        <i class="ph ph-activity text-xl font-bold"></i>
                    </div>
                    <div>
                        <h3 class="font-bold text-gray-800">Strava / Garmin</h3>
                        <p class="text-xs text-gray-500">Sincronizar treinos</p>
                    </div>
                </div>
                <button id="strava-btn" onclick="connectStrava()" class="bg-[#FC4C02] text-white px-4 py-2 rounded-full font-bold text-xs shadow-md transition-colors">
                    Conectar
                </button>
            </div>

            <!-- KEY METRICS GRID -->
            <div class="grid grid-cols-2 gap-4">
                <!-- Passos -->
                <div class="bg-white rounded-3xl p-5 shadow-sm border border-gray-50 flex flex-col justify-between h-32">
                    <div class="flex justify-between items-start">
                        <div class="w-8 h-8 rounded-full bg-orange-100 flex items-center justify-center text-orange-500">
                            <i class="ph ph-sneaker text-lg"></i>
                        </div>
                        <span class="text-xs font-semibold text-green-500 bg-green-50 px-2 py-1 rounded-full">Hoje</span>
                    </div>
                    <div>
                        <h3 id="val-passos" class="text-2xl font-black text-gray-800">--</h3>
                        <p class="text-xs text-gray-500 font-medium">Passos dados</p>
                    </div>
                </div>

                <!-- Sono -->
                <div class="bg-white rounded-3xl p-5 shadow-sm border border-gray-50 flex flex-col justify-between h-32">
                    <div class="flex justify-between items-start">
                        <div class="w-8 h-8 rounded-full bg-indigo-100 flex items-center justify-center text-indigo-500">
                            <i class="ph ph-moon-stars text-lg"></i>
                        </div>
                        <span class="text-xs font-semibold text-green-500 bg-green-50 px-2 py-1 rounded-full">Hoje</span>
                    </div>
                    <div>
                        <h3 id="val-sono" class="text-2xl font-black text-gray-800">-- h</h3>
                        <p class="text-xs text-gray-500 font-medium">Horas de sono</p>
                    </div>
                </div>
            </div>

            <!-- Peso Atual -->
            <div class="bg-gradient-to-r from-primary to-primaryDark rounded-3xl p-6 shadow-lg text-white flex justify-between items-center">
                <div>
                    <p class="text-sm text-green-100 font-medium mb-1">Peso Atual</p>
                    <div class="flex items-end gap-2">
                        <h3 id="val-peso" class="text-4xl font-black">--</h3>
                        <span class="text-lg font-medium text-green-100 mb-1">kg</span>
                    </div>
                </div>
                <div class="w-12 h-12 rounded-full bg-white/20 flex items-center justify-center backdrop-blur-sm">
                    <i class="ph ph-scales text-2xl text-white"></i>
                </div>
            </div>

            <!-- CHART SECTION -->
            <div class="bg-white rounded-3xl p-5 shadow-sm border border-gray-50">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="font-bold text-gray-800">Evolução do Peso</h3>
                    <select class="text-xs bg-gray-50 border border-gray-100 text-gray-600 rounded-full px-3 py-1 outline-none">
                        <option>Última semana</option>
                    </select>
                </div>
                <div class="h-48 w-full relative">
                    <canvas id="weightChart"></canvas>
                </div>
            </div>
        </section>

        <!-- SCREEN 2: EXAMES (Hidden by default) -->
        <section id="screen-exames" class="p-6 space-y-6 hidden screen-enter">
            <h2 class="text-2xl font-bold">Meus Exames</h2>
            
            <div class="bg-white rounded-3xl p-5 shadow-sm border border-gray-50 flex items-center justify-between">
                <div class="flex items-center gap-4">
                    <div class="w-12 h-12 rounded-2xl bg-blue-50 flex items-center justify-center text-blue-500">
                        <i class="ph ph-file-pdf text-2xl"></i>
                    </div>
                    <div>
                        <h4 class="font-bold text-gray-800">Hemograma Completo</h4>
                        <p class="text-xs text-gray-500">10 de Mai, 2026</p>
                    </div>
                </div>
                <button class="w-8 h-8 rounded-full bg-gray-50 flex items-center justify-center text-gray-600">
                    <i class="ph ph-download-simple"></i>
                </button>
            </div>
        </section>
    </main>

    <!-- BOTTOM NAVIGATION -->
    <nav class="fixed bottom-0 w-full bg-white border-t border-gray-100 pb-safe pt-2 px-6 flex justify-around items-center h-20 z-50">
        <button onclick="switchTab('dashboard')" class="flex flex-col items-center gap-1 text-primary w-16">
            <i class="ph-fill ph-squares-four text-2xl"></i>
            <span class="text-[10px] font-medium">Início</span>
        </button>
        <button onclick="switchTab('exames')" class="flex flex-col items-center gap-1 text-gray-400 hover:text-primary transition-colors w-16">
            <i class="ph ph-heartbeat text-2xl"></i>
            <span class="text-[10px] font-medium">Exames</span>
        </button>
        <button class="flex flex-col items-center gap-1 text-gray-400 hover:text-primary transition-colors w-16">
            <i class="ph ph-user text-2xl"></i>
            <span class="text-[10px] font-medium">Perfil</span>
        </button>
    </nav>

    <!-- MODAL: ADICIONAR DADOS (Oculto por padrão) -->
    <div id="add-modal" class="fixed inset-0 bg-black/50 z-[100] hidden items-end sm:items-center justify-center backdrop-blur-sm">
        <div class="bg-white w-full sm:w-96 rounded-t-3xl sm:rounded-3xl p-6 transform transition-transform translate-y-0">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-xl font-bold text-gray-800">Registrar Hoje</h3>
                <button onclick="closeAddModal()" class="w-8 h-8 bg-gray-100 rounded-full flex items-center justify-center text-gray-600">
                    <i class="ph ph-x"></i>
                </button>
            </div>

            <div class="space-y-4">
                <div>
                    <label class="block text-xs font-semibold text-gray-500 mb-1">Peso (kg)</label>
                    <input type="number" id="input-peso" placeholder="Ex: 78.5" step="0.1" class="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-3 outline-none focus:border-primary">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-gray-500 mb-1">Passos</label>
                    <input type="number" id="input-passos" placeholder="Ex: 10000" class="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-3 outline-none focus:border-primary">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-gray-500 mb-1">Horas de Sono</label>
                    <input type="number" id="input-sono" placeholder="Ex: 7.5" step="0.1" class="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-3 outline-none focus:border-primary">
                </div>
                
                <button onclick="salvarDados()" class="w-full bg-primary text-white font-bold py-3 rounded-xl mt-4 hover:bg-primaryDark transition-colors">
                    Salvar Dados
                </button>
            </div>
        </div>
    </div>

    <script>
        // --- NAVEGAÇÃO DE ABAS ---
        function switchTab(tabId) {
            document.getElementById('screen-dashboard').classList.add('hidden');
            document.getElementById('screen-exames').classList.add('hidden');
            document.getElementById('screen-' + tabId).classList.remove('hidden');
        }

        // --- LÓGICA DO MODAL ---
        function openAddModal() {
            document.getElementById('add-modal').classList.remove('hidden');
            document.getElementById('add-modal').classList.add('flex');
        }

        function closeAddModal() {
            document.getElementById('add-modal').classList.add('hidden');
            document.getElementById('add-modal').classList.remove('flex');
        }

        // --- LÓGICA DO STRAVA ---
        const STRAVA_CLIENT_ID = '238732';

        function connectStrava() {
            // A URL atual do seu aplicativo na Vercel
            const redirectUri = window.location.origin; 
            const stravaAuthUrl = `https://www.strava.com/oauth/authorize?client_id=${STRAVA_CLIENT_ID}&response_type=code&redirect_uri=${redirectUri}&approval_prompt=force&scope=activity:read_all`;
            
            // Redireciona o usuário para a tela oficial do Strava
            window.location.href = stravaAuthUrl;
        }

        // Checar se voltou do Strava com o código
        window.addEventListener('load', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const authCode = urlParams.get('code');

            if (authCode) {
                console.log("Código do Strava recebido!", authCode);
                
                // Muda o visual do botão
                const stravaBtn = document.getElementById('strava-btn');
                if(stravaBtn) {
                    stravaBtn.innerText = "Código Recebido!";
                    stravaBtn.classList.replace('bg-[#FC4C02]', 'bg-green-500');
                }

                // Limpa a URL do navegador
                window.history.replaceState({}, document.title, window.location.pathname);
            }
        });


        // --- CONFIGURAÇÃO DO SUPABASE ---
        // ATENÇÃO: COLE SUAS CHAVES DO SUPABASE AQUI EMBAIXO NOVAMENTE!
        const supabaseUrl = 'COLE_A_SUA_PROJECT_URL_AQUI'; 
        const supabaseKey = 'COLE_A_SUA_API_KEY_ANON_PUBLIC_AQUI';
        
        // Inicializa o cliente do Supabase
        const supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey);

        // Variável global para guardar o gráfico
        let meuGrafico; 

        // Função para buscar dados e atualizar a tela
        async function carregarDados() {
            try {
                const { data, error } = await supabaseClient
                    .from('health_metrics')
                    .select('*')
                    .order('data', { ascending: true }); // Puxa do mais antigo para o mais novo

                if (error) throw error;

                if (data && data.length > 0) {
                    // Pega o dado mais recente (o último da lista)
                    const hoje = data[data.length - 1];
                    
                    document.getElementById('val-peso').innerText = hoje.peso;
                    document.getElementById('val-passos').innerText = hoje.passos.toLocaleString('pt-BR');
                    document.getElementById('val-sono').innerText = hoje.horas_sono;

                    // Prepara dados para o gráfico
                    const datas = data.map(item => item.data.split('-')[2] + '/' + item.data.split('-')[1]); // Ex: 10/05
                    const pesos = data.map(item => item.peso);

                    atualizarGrafico(datas, pesos);
                }
            } catch (err) {
                console.error("Erro ao puxar dados:", err);
            }
        }

        // Função para salvar novos dados do Modal
        async function salvarDados() {
            const peso = document.getElementById('input-peso').value;
            const passos = document.getElementById('input-passos').value;
            const sono = document.getElementById('input-sono').value;

            if(!peso || !passos || !sono) {
                alert("Preencha todos os campos!");
                return;
            }

            try {
                // Envia para o Supabase
                const { error } = await supabaseClient
                    .from('health_metrics')
                    .insert([
                        { peso: parseFloat(peso), passos: parseInt(passos), horas_sono: parseFloat(sono) }
                    ]);

                if (error) throw error;

                // Sucesso!
                closeAddModal(); // Fecha a janela
                carregarDados(); // Recarrega os dados novos na tela
                
                // Limpa os campos
                document.getElementById('input-peso').value = '';
                document.getElementById('input-passos').value = '';
                document.getElementById('input-sono').value = '';

            } catch (err) {
                console.error("Erro ao salvar:", err);
                alert("Erro ao salvar dados.");
            }
        }

        // --- GRÁFICO ---
        function atualizarGrafico(labels, data) {
            const ctx = document.getElementById('weightChart').getContext('2d');
            
            // Destrói o gráfico antigo se existir, para não sobrepor
            if(meuGrafico) {
                meuGrafico.destroy();
            }

            meuGrafico = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Peso (kg)',
                        data: data,
                        borderColor: '#10b981',
                        backgroundColor: 'rgba(16, 185, 129, 0.1)',
                        borderWidth: 3,
                        pointBackgroundColor: '#ffffff',
                        pointBorderColor: '#10b981',
                        pointBorderWidth: 2,
                        pointRadius: 4,
                        fill: true,
                        tension: 0.4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { 
                            beginAtZero: false, 
                            grid: { borderDash: [4, 4], color: '#f3f4f6' },
                            ticks: { font: { family: 'Inter' }, color: '#9ca3af' }
                        },
                        x: { 
                            grid: { display: false },
                            ticks: { font: { family: 'Inter' }, color: '#9ca3af' }
                        }
                    }
                }
            });
        }

        // Executa a busca assim que o aplicativo abre
        carregarDados();
    </script>
</body>
</html>
